name: Deploy Azure Functions (Backend)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and validate dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r backend/requirements.txt

      - name: Create deployment package
        run: |
          cd backend
          zip -r ../release.zip . --exclude ".venv/*" --exclude "__pycache__/*" --exclude "*.pyc" --exclude "test_*.py"

      - uses: actions/upload-artifact@v4
        with:
          name: python-backend
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CD34E18D160E408786AA42AB181A01D9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3378B6BFA13240C1BA7C9510157F90C9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F466530BE59E4B5CA000DA98C3BAEF37 }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: functions-app01
          package: release.zip
